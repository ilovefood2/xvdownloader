<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>X Video Downloader — HLS test harness</title>
    <style>
      body {
        font: 14px/1.5 "Segoe UI", system-ui, sans-serif;
        max-width: 820px;
        margin: 24px auto;
        padding: 0 16px;
        color: #14171a;
      }
      h1 {
        font-size: 20px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin: 10px 0;
      }
      input[type="text"] {
        flex: 1;
        min-width: 320px;
        padding: 7px 10px;
        border: 1px solid #ccd6dd;
        border-radius: 6px;
        font: inherit;
      }
      button {
        padding: 7px 14px;
        border: none;
        border-radius: 6px;
        background: #1d9bf0;
        color: #fff;
        font: 600 13px/1 inherit;
        cursor: pointer;
      }
      button.secondary {
        background: #536471;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .preset {
        background: #eff3f4;
        color: #0f1419;
        font-weight: 500;
      }
      #bar {
        height: 14px;
        background: #eff3f4;
        border-radius: 7px;
        overflow: hidden;
      }
      #barFill {
        height: 100%;
        width: 0;
        background: #1d9bf0;
        transition: width 0.1s linear;
      }
      #status {
        font-weight: 600;
        margin: 8px 0;
      }
      #log {
        white-space: pre-wrap;
        background: #15202b;
        color: #d9e1e8;
        padding: 12px;
        border-radius: 8px;
        height: 240px;
        overflow: auto;
        font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace;
      }
      .hint {
        color: #536471;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>HLS test harness</h1>
    <p class="hint">
      Exercises the same <code>src/hls.js</code> pipeline the extension uses —
      including ffmpeg.wasm for encrypted (AES-128) and MPEG-TS streams. Paste an
      <code>.m3u8</code> URL (must allow CORS) or use a preset, then Start.
    </p>

    <div class="row">
      <input id="url" type="text" placeholder="https://…/playlist.m3u8" />
    </div>
    <div class="row" id="presets"></div>
    <div class="row">
      <button id="start">Start</button>
      <button id="pause" class="secondary" disabled>Pause</button>
      <button id="cancel" class="secondary" disabled>Cancel</button>
    </div>

    <div id="status">Idle</div>
    <div id="bar"><div id="barFill"></div></div>
    <p id="result" class="hint"></p>

    <h3>Log</h3>
    <div id="log"></div>

    <script type="module" src="hls-test.js"></script>
  </body>
</html>
